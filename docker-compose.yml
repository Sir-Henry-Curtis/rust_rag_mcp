services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB:       rag_dev
      POSTGRES_USER:     rag
      POSTGRES_PASSWORD: rag_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
